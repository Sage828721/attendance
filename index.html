<!DOCTYPE html>
<html>
<head>
    <title>Attendance Pro - Sound & Speed</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card { background: white; color: #333; padding: 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); width: 90%; max-width: 380px; text-align: center; }
        h2 { color: #1e3c72; margin-bottom: 20px; font-size: 22px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: #1e3c72; }
        video { width: 100%; border-radius: 15px; margin: 10px 0; border: 3px solid #1e3c72; background: #000; }
        .btn-container { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-in { background: #28a745; color: white; }
        .btn-out { background: #dc3545; color: white; }
        button:active { transform: scale(0.95); opacity: 0.8; }
        #status { margin-top: 15px; font-weight: bold; min-height: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Staff Attendance</h2>
    <input type="text" id="empId" placeholder="Employee Name/ID">
    <input type="password" id="password" placeholder="Password">
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <div class="btn-container">
        <button class="btn-in" onclick="submitAttendance('IN')">PUNCH IN</button>
        <button class="btn-out" onclick="submitAttendance('OUT')">PUNCH OUT</button>
    </div>
    <p id="status"></p>
</div>

<script>
    const video = document.getElementById('video');
    // APNA NEW GOOGLE SCRIPT URL YAHAN DALEIN
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxiBeZKuQzqit6u5ae9gCd2d44e8RZnhhfeOKtl_MxJYLfzRJujq9EqKNIK1zrsnLcA/exec';

    // Camera Start
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(stream => { video.srcObject = stream; })
        .catch(err => alert("Camera permission denied!"));

    // Function for Voice
    function speak(text) {
        const msg = new SpeechSynthesisUtterance();
        msg.text = text;
        msg.lang = 'hi-IN'; // Hindi-English mix accent
        msg.rate = 0.9;
        window.speechSynthesis.speak(msg);
    }

    function submitAttendance(type) {
        const empId = document.getElementById('empId').value;
        const password = document.getElementById('password').value;
        const status = document.getElementById('status');

        if(!empId || !password) { 
            speak("Kripya ID aur Password bhariye");
            alert("ID aur Password bhariye!"); 
            return; 
        }

        status.style.color = "blue";
        status.innerText = "Processing... Wait";

        // Capture Photo (Quality 0.5 for 1-second speed)
        const canvas = document.getElementById('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        const imageData = canvas.toDataURL('image/jpeg', 0.5);

        // Send Data
        fetch(scriptURL, {
            method: 'POST',
            body: JSON.stringify({ empId: empId, password: password, type: type, image: imageData })
        })
        .then(res => res.text())
        .then(response => {
            if(response === "Success") {
                status.style.color = "green";
                status.innerText = "Success: " + type;
                
                // Voice Message Based on IN/OUT
                if(type === "IN") {
                    speak("Welcome " + empId + ". Aapki haajri lag gayi hai.");
                } else {
                    speak("Dhanyawad " + empId + ". See you tomorrow.");
                }
            } else {
                status.style.color = "red";
                status.innerText = "Error: " + response;
                speak("Login failed. Password galat hai.");
            }
        })
        .catch(err => {
            status.innerText = "Network Error!";
            speak("Internet check kijiye.");
        });
    }
</script>

</body>
</html>
